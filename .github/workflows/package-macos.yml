name: Package - MacOS
on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: macos-${{ github.workflow_ref }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  package:
    name: OS 26
    runs-on: macos-26
    env:
        MACOSX_DEPLOYMENT_TARGET: 14
    steps:
      - name: Clone Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          path: src

      - name: Collect architecture
        id: architecture
        run: |
          printf 'uname_m=%s\n' "$(uname -m)" >> "$GITHUB_OUTPUT"

      - name: Install Dependencies
        working-directory: src
        run: brew bundle --verbose

      - name: Update gamecontrollerdb.txt
        working-directory: src
        run: >-
          curl --fail --silent --show-error --location
          --output contrib/gamecontrollerdb.txt
          https://raw.githubusercontent.com/gabomdq/SDL_GameControllerDB/master/gamecontrollerdb.txt
          || true

      - name: Configure and Build
        working-directory: src
        run: >
          set -eu

          # I do not know why, but readline is not found by pkg-config

          # For a idea of a fix see: https://superuser.com/a/1277306

          export PKG_CONFIG_PATH=/usr/local/opt/readline/lib/pkgconfig

          # run build

          scons
          -j4
          -k
          opengl=1
          sdl2=1
          macos_add_frameworks=0
          macos_bundle_libs=1
          build/D{1,2}X-Rebirth.app

          # Copy gamecontrollerdb.txt into app bundles

          for app in build/D{1,2}X-Rebirth.app; do
            if [ -d "$app" ] && [ -f "contrib/gamecontrollerdb.txt" ]; then
              cp "contrib/gamecontrollerdb.txt" "$app/Contents/Resources/"
            fi
          done

          mv build/D{1,2}X-Rebirth.app ..

      - name: Upload SConf log
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "SConf-MacOS${{ env.MACOSX_DEPLOYMENT_TARGET }}-${{ steps.architecture.outputs.uname_m }}"
          path: 'src/build/config.log'

      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "DXX-Rebirth-MacOS${{ env.MACOSX_DEPLOYMENT_TARGET }}-${{ steps.architecture.outputs.uname_m }}"
          path: 'D*X-Rebirth.app'

      - name: Check header includes
        working-directory: src
        run: >
          set -eu

          export PKG_CONFIG_PATH=/usr/local/opt/readline/lib/pkgconfig

          scons
          -j4
          -k
          opengl=1
          sdl2=1
          macos_add_frameworks=0
          macos_bundle_libs=1
          check_header_includes=1
          build/{common,d1x-rebirth,d2x-rebirth}/check_header_includes
